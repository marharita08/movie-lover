      property="og:title"
      content="Movie Lover — AI Movie & TV Show Recommendations"

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Movie Lover",
        "description": "Turn your IMDb lists into insights and personalized recommendations. Upload your CSV, explore statistics, and chat with AI to discover movies and TV shows.",
        "applicationCategory": "EntertainmentApplication",
        "url": "https://movie-lover-five.vercel.app",
        "inLanguage": ["en", "uk"],
        "featureList": [
          "Export and upload IMDb CSV lists",
          "Movie taste statistics and insights",
          "AI-powered movie recommendations",
          "TV show recommendations",
          "Multiple IMDb lists support (watchlist, rated, custom)"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0"
        }
      }

  <body>
    <div id="root"></div>
    <noscript>
      <main>
        <h1>Movie Lover — AI Movie & TV Show Recommendations</h1>
        <h2>How it works</h2>
        <p>
          Turn your IMDb lists into insights and personalized recommendations.
        </p>
        <ol>
          <li>
            <h3>Export your IMDb list</h3>
            <p>
              Download your IMDb list as a CSV file. Rated titles are
              recommended for better insights.
            </p>
          </li>
          <li>
            <h3>Upload your list</h3>
            <p>
              Upload your CSV file to create your personal movie profile. You
              can upload multiple IMDb lists — watchlist, rated, or custom
              lists.
            </p>
          </li>
          <li>
            <h3>Explore your statistics</h3>
            <p>Discover your movie taste through statistics and insights.</p>
          </li>
          <li>
            <h3>Get AI recommendations</h3>
            <p>
              Chat with AI to receive personalized movie and TV show
              recommendations based on your lists.
            </p>
          </li>
        </ol>
      </main>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
